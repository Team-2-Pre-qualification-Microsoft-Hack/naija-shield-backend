name: Deploy .NET Backend to Azure

on:
  push:
    branches:
      - main  # Change to 'master' if your main branch is called master

env:
  AZURE_WEBAPP_NAME: api-naijashield-dev # Make sure this is your exact Azure App name
  DOTNET_VERSION: '9.0.x' # Change to '9.0.x' if you used .NET 9

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build the app
        run: dotnet build --configuration Release

      - name: Publish the app
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{env.DOTNET_ROOT}}/myapp
